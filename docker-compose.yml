services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tribe_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tribe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tribe_events"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tribe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ../events-xakaton-nestjs
    # .env загружается как база; DATABASE_URL и REDIS_URL переопределяются
    # на имена сервисов docker-compose (вместо localhost)
    env_file: ../events-xakaton-nestjs/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tribe_events
      REDIS_URL: redis://redis:6379
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tribe-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* встраивается в JS при сборке — браузер обращается напрямую к хосту
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - tribe-network
    restart: unless-stopped

networks:
  tribe-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
