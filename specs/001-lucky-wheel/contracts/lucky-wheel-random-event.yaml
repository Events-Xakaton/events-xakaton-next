openapi: 3.0.3
info:
  title: Lucky Wheel Random Event Contract
  version: 1.0.0
paths:
  /events/random:
    get:
      summary: Pre-resolve one event for lucky wheel
      description: Returns one eligible event id for the current user according to lucky-wheel policy.
      responses:
        '200':
          description: Eligible event selected
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
        '404':
          description: No selection available
          content:
            application/json:
              schema:
                type: object
                required: [message, code]
                properties:
                  message:
                    type: string
                    example: Нет подходящих случайных событий
                  code:
                    type: string
                    enum: [NO_ELIGIBLE_EVENTS, DAILY_LIMIT_REACHED]
        '401':
          description: Unauthorized user context
        '429':
          description: Too many requests
